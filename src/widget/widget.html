<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenVila Widget Preview</title>
  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(135deg, #f3f7ff, #f0fff9);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #0f172a;
    }

    .container {
      width: min(90vw, 800px);
      background: #ffffff;
      border: 1px solid #e2e8f0;

      padding: 20px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);

      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 16px;
      color: #475569;
    }

    .hint {
      padding: 12px;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      background: #f8fafc;
      color: #334155;
      line-height: 1.6;
      font-size: 14px;
    }

    code {
      background: #e2e8f0;
      border-radius: 6px;
      padding: 2px 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OpenVila Widget Preview</h1>
    <p>This page was generated by <code>/run</code>. The widget launcher should appear in the bottom-right corner.</p>

      Embed snippet:
      <code>&lt;script src="/openvila/widget.js" data-color="#0f766e" defer&gt;&lt;/script&gt;</code><br />
